<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111115"/><stop offset="100%" style="stop-color:#0e0e12"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE500"/><stop offset="100%" stop-color="#7f7200"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- OPEN PADLOCKS - the signature element -->
  <g stroke="#FFE500" fill="none" opacity="0.12">
    <!-- Left lock - open -->
    <rect x="540" y="175" width="35" height="28" rx="4" stroke-width="1.5"/>
    <path d="M550,175 L550,162 A12,12 0 0,1 565,162" stroke-width="1.8"/>
    <circle cx="557" cy="189" r="3" fill="#FFE500" opacity="0.1"/>
    <line x1="557" y1="192" x2="557" y2="198" stroke-width="1"/>
    <!-- Right lock - open -->
    <rect x="625" y="175" width="35" height="28" rx="4" stroke-width="1.5"/>
    <path d="M635,175 L635,162 A12,12 0 0,1 650,162" stroke-width="1.8"/>
    <circle cx="642" cy="189" r="3" fill="#FFE500" opacity="0.1"/>
    <line x1="642" y1="192" x2="642" y2="198" stroke-width="1"/>
  </g>

  <!-- CODE BRACKETS < > -->
  <g stroke="#7f7200" fill="none" stroke-width="2" opacity="0.15">
    <polyline points="420,115 390,150 420,185"/><polyline points="780,115 810,150 780,185"/>
  </g>
  <!-- Forward slash -->
  <g stroke="#7f7200" fill="none" stroke-width="1" opacity="0.1">
    <line x1="475" y1="110" x2="455" y2="190"/><line x1="745" y1="110" x2="725" y2="190"/>
  </g>

  <!-- Git fork/branch trees -->
  <g stroke="#FFE500" fill="none" stroke-width="1" opacity="0.14">
    <!-- Left tree -->
    <circle cx="140" cy="70" r="8"/><circle cx="110" cy="130" r="8"/><circle cx="170" cy="130" r="8"/><circle cx="90" cy="185" r="6"/><circle cx="130" cy="185" r="6"/><circle cx="155" cy="185" r="6"/><circle cx="190" cy="185" r="6"/>
    <line x1="140" y1="78" x2="140" y2="100"/><line x1="140" y1="100" x2="110" y2="122"/><line x1="140" y1="100" x2="170" y2="122"/>
    <line x1="110" y1="138" x2="110" y2="155"/><line x1="110" y1="155" x2="90" y2="179"/><line x1="110" y1="155" x2="130" y2="179"/>
    <line x1="170" y1="138" x2="170" y2="155"/><line x1="170" y1="155" x2="155" y2="179"/><line x1="170" y1="155" x2="190" y2="179"/>
    <!-- Right tree -->
    <circle cx="1060" cy="70" r="8"/><circle cx="1030" cy="130" r="8"/><circle cx="1090" cy="130" r="8"/><circle cx="1010" cy="185" r="6"/><circle cx="1050" cy="185" r="6"/><circle cx="1075" cy="185" r="6"/><circle cx="1110" cy="185" r="6"/>
    <line x1="1060" y1="78" x2="1060" y2="100"/><line x1="1060" y1="100" x2="1030" y2="122"/><line x1="1060" y1="100" x2="1090" y2="122"/>
    <line x1="1030" y1="138" x2="1030" y2="155"/><line x1="1030" y1="155" x2="1010" y2="179"/><line x1="1030" y1="155" x2="1050" y2="179"/>
    <line x1="1090" y1="138" x2="1090" y2="155"/><line x1="1090" y1="155" x2="1075" y2="179"/><line x1="1090" y1="155" x2="1110" y2="179"/>
  </g>

  <!-- Open books -->
  <g stroke="#7f7200" fill="none" opacity="0.12">
    <g transform="translate(280, 80)" stroke-width="1">
      <path d="M0,-25 C-10,-25 -40,-22 -50,-18 L-50,30 C-40,26 -10,24 0,24"/>
      <path d="M0,-25 C10,-25 40,-22 50,-18 L50,30 C40,26 10,24 0,24"/>
      <line x1="0" y1="-25" x2="0" y2="24" stroke-width="1.5"/>
      <g stroke-width="0.4" opacity="0.4"><line x1="-42" y1="-6" x2="-5" y2="-8"/><line x1="-40" y1="4" x2="-5" y2="2"/><line x1="-42" y1="14" x2="-5" y2="12"/><line x1="5" y1="-8" x2="42" y2="-6"/><line x1="5" y1="2" x2="40" y2="4"/><line x1="5" y1="12" x2="42" y2="14"/></g>
    </g>
    <g transform="translate(920, 190)" stroke-width="1">
      <path d="M0,-25 C-10,-25 -40,-22 -50,-18 L-50,30 C-40,26 -10,24 0,24"/>
      <path d="M0,-25 C10,-25 40,-22 50,-18 L50,30 C40,26 10,24 0,24"/>
      <line x1="0" y1="-25" x2="0" y2="24" stroke-width="1.5"/>
      <g stroke-width="0.4" opacity="0.4"><line x1="-42" y1="-6" x2="-5" y2="-8"/><line x1="-40" y1="4" x2="-5" y2="2"/><line x1="-42" y1="14" x2="-5" y2="12"/><line x1="5" y1="-8" x2="42" y2="-6"/><line x1="5" y1="2" x2="40" y2="4"/><line x1="5" y1="12" x2="42" y2="14"/></g>
    </g>
  </g>

  <!-- Community people clusters -->
  <g stroke="#FFE500" fill="none" stroke-width="0.8" opacity="0.1">
    <g transform="translate(100, 230)">
      <circle cx="0" cy="-5" r="4"/><path d="M-8,5 C-8,0 -5,-2 0,-2 C5,-2 8,0 8,5"/>
      <circle cx="20" cy="-5" r="4"/><path d="M12,5 C12,0 15,-2 20,-2 C25,-2 28,0 28,5"/>
      <circle cx="-20" cy="-5" r="4"/><path d="M-28,5 C-28,0 -25,-2 -20,-2 C-15,-2 -12,0 -12,5"/>
    </g>
    <g transform="translate(1100, 230)">
      <circle cx="0" cy="-5" r="4"/><path d="M-8,5 C-8,0 -5,-2 0,-2 C5,-2 8,0 8,5"/>
      <circle cx="20" cy="-5" r="4"/><path d="M12,5 C12,0 15,-2 20,-2 C25,-2 28,0 28,5"/>
      <circle cx="-20" cy="-5" r="4"/><path d="M-28,5 C-28,0 -25,-2 -20,-2 C-15,-2 -12,0 -12,5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="url(#tGrad)" text-anchor="middle" letter-spacing="8">Totem Group: Public</text>
</svg>